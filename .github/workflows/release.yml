name: Publish distributions

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: Package index used for a manual verification release
        required: true
        type: choice
        options:
          - testpypi

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}-${{ inputs.target || 'pypi' }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade build twine
      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]
          expected = f"v{version}"
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              raise SystemExit(f"Release tag {actual!r} must equal {expected!r}")
          PY
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/text-to-music-prompt-structurer
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/text-to-music-prompt-structurer
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

